<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | StudentSkillHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">🚀 StudentSkillHub</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="contact-section">
            <h1>Get in Touch</h1>
            <p>Have questions or want to host a skill workshop? Drop us a line below.</p>
            
            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@university.edu">
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" required placeholder="Tell us what's on your mind..."></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
            <div id="formFeedback" class="form-feedback hidden"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 StudentSkillHub. Built via Vibe Coding.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
